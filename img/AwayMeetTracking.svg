<svg xmlns="http://www.w3.org/2000/svg" width="120" height="100" viewBox="0 0 120 100">
  <rect width="120" height="100" rx="8" ry="8" fill="#cc000c" />
  <svg x="40" y="10" width="40" height="40" viewBox="0 0 24 24">
    <g>
      <!-- Page background -->
      <rect x="2" y="2" width="20" height="20" rx="3" fill="white" stroke="#cc000c" stroke-width="1.5" />
      <!-- Form fields -->
      <rect x="5" y="6" width="14" height="2" rx="0.5" fill="#eee" stroke="#cc000c" stroke-width="0.5" />
      <rect x="5" y="10" width="14" height="2" rx="0.5" fill="#eee" stroke="#cc000c" stroke-width="0.5" />
      <rect x="5" y="14" width="14" height="2" rx="0.5" fill="#eee" stroke="#cc000c" stroke-width="0.5" />
      <!-- Optional pencil -->
      <polygon points="17,18 19,20 21,18 19,16" fill="#cc000c" stroke="#cc000c" stroke-width="0.5" />
      <rect x="18.2" y="17" width="2" height="4" rx="0.3" fill="#cc000c" />
    </g>
  </svg>
  <text x="60" y="62" text-anchor="middle" font-family="Aptos, Calibri, sans-serif" font-size="16" font-weight="bold" fill="white" dominant-baseline="middle">
    <tspan x="60" dy="0">Away Meet</tspan>
    <tspan x="60" dy="1.2em">Tracking</tspan>
  </text>
</svg>
